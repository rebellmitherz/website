<!DOCTYPE html>
<html lang="de">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-LTG3V4SS14"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-LTG3V4SS14');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestellung abgeschlossen — Rebell mit Herz</title>
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#090c0f;color:#eef3f5;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;text-align:center}
  main{max-width:560px}p{color:#a8b2bd;line-height:1.6}
</style>
</head>
<body>
<main>
  <h1>Danke für deine Bestellung.</h1>
  <p>Du kannst dieses Fenster jetzt schließen.</p>
</main>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var sessionId = params.get('session_id');
    var next = params.get('next');
    var nextUrl;

    if (!sessionId || !/^cs_(?:test_|live_)?[A-Za-z0-9]+$/.test(sessionId)) {
      return;
    }

    gtag('event', 'purchase', { transaction_id: sessionId });

    try {
      nextUrl = new URL(next);
      if (nextUrl.protocol !== 'https:' || nextUrl.origin !== 'https://website.rebellsystem.com' || nextUrl.username || nextUrl.password) {
        return;
      }
    } catch (error) {
      return;
    }

    window.setTimeout(function () {
      window.location.assign(nextUrl.href);
    }, 800);
  }());
</script>
</body>
</html>
